<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Habit — Habit Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:        #0e0f11;
            --surface:   #16181c;
            --border:    #2a2d35;
            --text:      #e8e9ec;
            --muted:     #6b7280;
            --accent:    #4ade80;
            --accent-dim:#1a3a27;
            --danger:    #f87171;
            --radius:    10px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 28px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        .back-link {
            font-size: 0.78rem;
            color: var(--muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s;
        }

        .back-link:hover {
            color: var(--text);
        }

        .back-link::before {
            content: '←';
        }

        /* ── Main layout ── */
        main {
            max-width: 560px;
            margin: 0 auto;
            padding: 64px 32px;
            animation: fadeUp 0.35s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page-heading {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .page-subheading {
            color: var(--muted);
            font-size: 0.83rem;
            margin-bottom: 48px;
        }

        /* ── Form ── */
        .habit-form {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"],
        select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            padding: 12px 16px;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.12);
        }

        input[type="text"]::placeholder {
            color: var(--muted);
        }

        /* Custom select arrow */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            font-size: 0.85rem;
        }

        select option {
            background: var(--surface);
        }

        /* ── Validation errors ── */
        .field-error {
            font-size: 0.75rem;
            color: var(--danger);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .field-error::before {
            content: '!';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--danger);
            color: #0e0f11;
            font-size: 0.65rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        input.has-error,
        select.has-error {
            border-color: var(--danger);
        }

        /* ── Submit button ── */
        .form-footer {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-top: 8px;
        }

        .btn-submit {
            background: var(--accent);
            color: #0a1a10;
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            font-weight: 500;
            border: none;
            border-radius: var(--radius);
            padding: 12px 28px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s;
        }

        .btn-submit:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .btn-cancel {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.15s;
        }

        .btn-cancel:hover {
            color: var(--text);
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 32px;
            color: var(--muted);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 80px;
        }
    </style>
</head>
<body>

<header>
    <a th:href="@{/habits}" class="logo">habit<span>.</span>track</a>
    <a th:href="@{/habits}" class="back-link">Back to habits</a>
</header>

<main>
    <h1 class="page-heading">New Habit</h1>
    <p class="page-subheading">Define what you want to build. Show up every day.</p>

    <form th:action="@{/habits}" th:object="${habit}" method="post" class="habit-form">

        <div class="field">
            <label for="name">Habit Name</label>
            <input type="text"
                   id="name"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'has-error'"
                   placeholder="e.g. Coding Practice"
                   required />
            <span class="field-error"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}">
            </span>
        </div>

        <div class="field">
            <label for="description">Description <span style="color: var(--muted); font-size:0.7rem;">(optional)</span></label>
            <input type="text"
                   id="description"
                   th:field="*{description}"
                   th:classappend="${#fields.hasErrors('description')} ? 'has-error'"
                   placeholder="e.g. 1 hour of focused LeetCode or project work" />
            <span class="field-error"
                  th:if="${#fields.hasErrors('description')}"
                  th:errors="*{description}">
            </span>
        </div>

        <div class="field">
            <label for="frequency">Frequency</label>
            <div class="select-wrapper">
                <select id="frequency"
                        th:field="*{frequency}"
                        th:classappend="${#fields.hasErrors('frequency')} ? 'has-error'">
                    <option th:each="freq : ${frequencies}"
                            th:value="${freq}"
                            th:text="${freq}">
                    </option>
                </select>
            </div>
            <span class="field-error"
                  th:if="${#fields.hasErrors('frequency')}"
                  th:errors="*{frequency}">
            </span>
        </div>

        <div class="form-footer">
            <button type="submit" class="btn-submit">Save Habit</button>
            <a th:href="@{/habits}" class="btn-cancel">Cancel</a>
        </div>

    </form>
</main>

<footer>
    built to keep you consistent
</footer>

</body>
</html>
